<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 640" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#444" />
    </marker>
  </defs>

  <rect width="900" height="640" fill="#ffffff" />

  <!-- Browser -->
  <rect x="370" y="10" width="160" height="40" rx="6" fill="#f5f5f5" stroke="#333" />
  <text x="450" y="34" text-anchor="middle" font-size="14">Browser</text>

  <!-- Route 53 -->
  <rect x="360" y="80" width="180" height="40" rx="6" fill="#f5f5f5" stroke="#333" />
  <text x="450" y="104" text-anchor="middle" font-size="13">Route 53 (DNS)</text>

  <line x1="450" y1="50" x2="450" y2="80" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- VPC boundary -->
  <rect x="40" y="150" width="820" height="460" rx="10" fill="none" stroke="#999" stroke-dasharray="6,4" />
  <text x="55" y="172" font-size="13" fill="#666">VPC 10.0.0.0/16</text>

  <!-- Public subnet -->
  <rect x="65" y="185" width="770" height="70" rx="6" fill="#eef4ff" stroke="#7a9fd6" />
  <text x="80" y="203" font-size="12" fill="#345" >Public subnets (2 AZs)</text>
  <rect x="350" y="212" width="200" height="35" rx="5" fill="#ffffff" stroke="#333" />
  <text x="450" y="234" text-anchor="middle" font-size="12">Application Load Balancer</text>

  <line x1="450" y1="120" x2="450" y2="212" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- Frontend ASG box -->
  <rect x="65" y="280" width="360" height="150" rx="6" fill="#eafaf1" stroke="#4caf7d" />
  <text x="80" y="300" font-size="12" fill="#256b47">ASG: todo-frontend (2 AZs, min 2 / max 4)</text>
  <rect x="90" y="315" width="140" height="50" rx="5" fill="#ffffff" stroke="#333" />
  <text x="160" y="336" text-anchor="middle" font-size="11">Frontend EC2</text>
  <text x="160" y="352" text-anchor="middle" font-size="10" fill="#555">Nitro node-server :3000</text>
  <rect x="270" y="315" width="140" height="50" rx="5" fill="#ffffff" stroke="#333" />
  <text x="340" y="336" text-anchor="middle" font-size="11">Frontend EC2</text>
  <text x="340" y="352" text-anchor="middle" font-size="10" fill="#555">Nitro node-server :3000</text>
  <text x="80" y="400" font-size="10" fill="#256b47">Target-tracking: avg CPU 50%</text>

  <!-- Backend ASG box -->
  <rect x="475" y="280" width="360" height="150" rx="6" fill="#fff2e8" stroke="#e08a3c" />
  <text x="490" y="300" font-size="12" fill="#8a4c14">ASG: todo-backend (2 AZs, min 2 / max 6)</text>
  <rect x="500" y="315" width="140" height="50" rx="5" fill="#ffffff" stroke="#333" />
  <text x="570" y="336" text-anchor="middle" font-size="11">Backend EC2</text>
  <text x="570" y="352" text-anchor="middle" font-size="10" fill="#555">uvicorn :8000</text>
  <rect x="680" y="315" width="140" height="50" rx="5" fill="#ffffff" stroke="#333" />
  <text x="750" y="336" text-anchor="middle" font-size="11">Backend EC2</text>
  <text x="750" y="352" text-anchor="middle" font-size="10" fill="#555">uvicorn :8000</text>
  <text x="490" y="400" font-size="10" fill="#8a4c14">Target-tracking: req count/target</text>

  <!-- ALB to tiers -->
  <line x1="420" y1="247" x2="245" y2="315" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="290" y="270" font-size="10" fill="#555">Host: app.*</text>
  <line x1="480" y1="247" x2="655" y2="315" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="560" y="270" font-size="10" fill="#555">Host: api.*</text>

  <!-- Secrets Manager -->
  <rect x="475" y="455" width="150" height="40" rx="6" fill="#f5f5f5" stroke="#333" />
  <text x="550" y="478" text-anchor="middle" font-size="11">Secrets Manager</text>
  <line x1="620" y1="365" x2="595" y2="455" stroke="#888" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow)" />
  <line x1="720" y1="365" x2="605" y2="455" stroke="#888" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow)" />

  <!-- Private DB subnet -->
  <rect x="65" y="530" width="770" height="70" rx="6" fill="#fdeef0" stroke="#d67788" />
  <text x="80" y="548" font-size="12" fill="#8a2d3b">Private-db subnets (2 AZs)</text>
  <rect x="350" y="558" width="200" height="35" rx="5" fill="#ffffff" stroke="#333" />
  <text x="450" y="580" text-anchor="middle" font-size="12">RDS PostgreSQL (Multi-AZ)</text>

  <line x1="570" y1="365" x2="450" y2="558" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)" />
  <line x1="750" y1="365" x2="470" y2="558" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)" />
</svg>
